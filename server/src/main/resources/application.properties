quarkus.http.non-application-root-path=/

quarkus.swagger-ui.always-include=true

exceptional.bedrock.model-id=amazon.titan-embed-text-v2:0
exceptional.bedrock.region=us-east-1
exceptional.dynamo.region=us-east-1
exceptional.dynamo.groups-table=exception_groups
exceptional.dynamo.reports-table=exception_reports
exceptional.similarity.threshold=0.85
exceptional.ttl.days=90

quarkus.http.cors=true
%dev.quarkus.http.cors.origins=*
%prod.quarkus.http.cors.origins=https://logs.alliancegenome.org,http://localhost:*
quarkus.http.cors.methods=GET,PUT,POST